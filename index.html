            <!-- Script for the arrows in the background -->
        
            
            <script>
                const canvas = document.getElementById("bg");
                const ctx = canvas.getContext("2d");
                
                let mouse = {
                    x: window.innerWidth / 2,
                    y: window.innerHeight / 2
                };

                const spacing = 40;

                function resize() {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                }

                window.addEventListener("resize", resize);
                resize();

                window.addEventListener("mousemove", e => {
                    mouse.x = e.clientX;
                    mouse.y = e.clientY;
                });

                function drawArrow(x, y, angle, length) {
                    const headSize = Math.max(4, length * 0.25);
                
                    const endX = x + Math.cos(angle) * length;
                    const endY = y + Math.sin(angle) * length;
                
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(endX, endY);
                    ctx.stroke();
                
                    ctx.beginPath();
                    ctx.moveTo(endX, endY);
                    ctx.lineTo(
                        endX - Math.cos(angle - Math.PI / 6) * headSize,
                        endY - Math.sin(angle - Math.PI / 6) * headSize
                    );
                    ctx.lineTo(
                        endX - Math.cos(angle + Math.PI / 6) * headSize,
                        endY - Math.sin(angle + Math.PI / 6) * headSize
                    );
                    ctx.closePath();
                    ctx.fill();
                }

                function animate() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                    ctx.strokeStyle = "#60a5fa";
                    ctx.fillStyle = "#60a5fa";
                    ctx.lineWidth = 2;
                
                    const maxDistance = Math.hypot(canvas.width, canvas.height);
                
                    for (let x = spacing / 2; x < canvas.width; x += spacing) {
                        for (let y = spacing / 2; y < canvas.height; y += spacing) {
                        
                            const dx = mouse.x - x;
                            const dy = mouse.y - y;
                        
                            const distance = Math.hypot(dx, dy);
                            const angle = Math.atan2(dy, dx);
                        
                            const normalizedDistance = Math.min(distance / 400, 1);
                        
                            // Very short near cursor, full length farther away
                            const length = 2 + normalizedDistance * 30;
                        
                            drawArrow(x, y, angle, length);
                        }
                    }
                
                    requestAnimationFrame(animate);
                }

                function shouldUseBackground() {
                    return (
                        window.innerWidth >= 768 &&
                        !window.matchMedia("(pointer: coarse)").matches
                    );
                }
                
                if (shouldUseBackground()) {
                    animate();
                } else {
                    canvas.remove();
                }
            </script>
